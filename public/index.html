<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPilot Pro</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon"></div>
        <h2>StockPilot</h2>
      </div>
      <nav class="nav-menu">
        <button class="nav-item active" data-target="dashboard">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
          Dashboard
        </button>
        <button class="nav-item" data-target="inventory">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
          Inventory
        </button>
        <button class="nav-item" data-target="pos">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
          Point of Sale
        </button>
      </nav>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <h1>Dashboard</h1>
        <div class="user-profile">
          <div class="avatar">Admin</div>
        </div>
      </header>

      <!-- Dashboard View -->
      <section id="dashboard" class="view active">
        <div class="stats-grid">
          <div class="stat-card glass">
            <h3>Total Revenue</h3>
            <p class="stat-value" id="stat-revenue">$0.00</p>
          </div>
          <div class="stat-card glass">
            <h3>Items Sold</h3>
            <p class="stat-value" id="stat-items">0</p>
          </div>
          <div class="stat-card glass warning">
            <h3>Low Stock Items</h3>
            <p class="stat-value" id="stat-low-stock">0</p>
          </div>
        </div>

        <div class="recent-sales glass">
          <div class="section-header">
            <h2>Recent Sales</h2>
          </div>
          <div class="table-container">
            <table id="recent-sales-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Total</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody>
                <!-- Rows injected via JS -->
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- Inventory View -->
      <section id="inventory" class="view">
        <div class="glass inventory-panel">
          <div class="section-header">
            <h2>Manage Inventory</h2>
            <button class="btn btn-primary" id="btn-add-product">Add Product</button>
          </div>
          <div class="table-container">
            <table id="inventory-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Price</th>
                  <th>Stock</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <!-- Rows injected via JS -->
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- POS View -->
      <section id="pos" class="view">
        <div class="pos-layout">
          <div class="glass pos-products">
            <h2>Select Product</h2>
            <div class="product-grid" id="pos-product-grid">
              <!-- Cards injected via JS -->
            </div>
          </div>
          <div class="glass pos-checkout">
            <h2>Current Sale</h2>
            <form id="pos-form">
              <div class="form-group">
                <label>Selected Product</label>
                <input type="text" id="pos-selected-name" readonly disabled placeholder="None selected">
                <input type="hidden" id="pos-selected-id">
              </div>
              <div class="form-group">
                <label>Price</label>
                <input type="text" id="pos-selected-price" readonly disabled placeholder="$0.00">
              </div>
              <div class="form-group">
                <label>Quantity</label>
                <input type="number" id="pos-quantity" min="1" value="1" disabled required>
              </div>
              <div class="checkout-total">
                <span>Total</span>
                <span id="pos-total">$0.00</span>
              </div>
              <button type="submit" class="btn btn-checkout" id="btn-checkout" disabled>Complete Sale</button>
            </form>
          </div>
        </div>
      </section>

    </main>
  </div>

  <!-- Modal for Add/Edit Product -->
  <div class="modal-overlay" id="product-modal">
    <div class="modal glass">
      <h2 id="modal-title">Add Product</h2>
      <form id="product-form">
        <input type="hidden" id="prod-id">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="prod-name" required>
        </div>
        <div class="form-group">
          <label>Price</label>
          <input type="number" step="0.01" id="prod-price" required>
        </div>
        <div class="form-group">
          <label>Quantity</label>
          <input type="number" id="prod-quantity" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="btn-cancel-modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
